# Template config for running:
#   py -3 interface.py analysis_config.yaml
#
# Notes:
# - Do NOT add GEN_CC_PARAMETERS here. interface.py forces it to True.
# - Provide exactly one of SMILE_TO_ANALYZE or MASS_TO_ANALYZE.
run_rxnnet: true  #If false, use existing cc parameters generated 
rxnnet_dir: ''    #timestamp dir inside ./Results/{molecule_name}
cgenff_path: /path/to/cgenff/executable

molecule_name: "cotb2"
source_smile: 'C/C1=C\C[C@@]2(C)CC[C@H]([C+](C)C)[C@@H]2CC/C(C)=C/CC1'
out_file_for_analyze: "cotb2_analyze.log"

# Keywords for RxnNet Analyzer
num_confs_to_generate: 100
align_to_product: true
machines:
  - "localhost"
  # - "arkm01"
smile_to_analyze: 'C/C1=C\C[C@@]2(C)CC[C@H](C(C)C)[C+]2CC/C(C)=C/CC1'
max_path_length_to_analyze: 2

#Keywords related to atom mapping CSV file
forward_mapping: true
reverse_mapping: false
fp_mode: "seq"

#Keywords for EnzyDock interface
link_to_enzydock: true
enzydock_root: '/path/to/enzydock_root'
enzydock_path: 'path/to/copy/enzydock' 
user_enzyme_files: 'path/to/user_enzyme_files'
#enzydock_set: [set0, set1]